<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>电力数据智能问答 Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 24px; }
    .title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .sub { color: #6b7280; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 16px; }
    .card { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 6px 24px rgba(0,0,0,0.06); }
    textarea { width: 100%; min-height: 90px; border: 1px solid #d1d5db; border-radius: 10px; padding: 12px; font-size: 15px; box-sizing: border-box; }
    .editor { min-height: 260px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    button { background: #2563eb; color: white; border: 0; border-radius: 10px; padding: 10px 16px; cursor: pointer; font-size: 14px; }
    button.secondary { background: #374151; }
    button.success { background: #059669; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
    label { font-size: 14px; color: #374151; }
    pre { background: #0f172a; color: #e5e7eb; padding: 14px; border-radius: 10px; overflow: auto; font-size: 13px; }
    .pill { display: inline-block; background: #e0e7ff; color: #3730a3; padding: 4px 10px; border-radius: 999px; margin-right: 8px; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border-bottom: 1px solid #e5e7eb; text-align: left; padding: 8px; }
    .muted { color: #6b7280; font-size: 13px; }
    .section-title { font-size: 16px; font-weight: 700; margin: 10px 0; }
    select { border: 1px solid #d1d5db; border-radius: 8px; padding: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">电力数据智能问答 Demo</div>
    <div class="sub">支持自然语言查数、gpt-5.4 问题分析、多表关联、同比计算、元数据在线维护。</div>

    <div class="grid">
      <div class="card">
        <div class="section-title">1. 输入问题</div>
        <textarea id="question">最近7天哪个供电所最大负荷最高？</textarea>
        <div class="row">
          <label><input type="checkbox" id="useLlm" checked /> 使用 gpt-5.4 做问题分析</label>
          <button onclick="runAnalyze()">只分析</button>
          <button onclick="runAsk()">分析并查询</button>
          <button class="secondary" onclick="loadMetadata()">查看元数据字典</button>
        </div>
        <div class="row muted">
          快速示例：
          <a href="#" onclick="setQ('最近7天哪个供电所最大负荷最高？')">供电所负荷排行</a>
          <a href="#" onclick="setQ('本月各供电所总电量排行')">供电所电量排行</a>
          <a href="#" onclick="setQ('本月线路线损率排行')">线路线损排行</a>
          <a href="#" onclick="setQ('本月城南台区线损率同比情况')">同比查询</a>
        </div>
      </div>

      <div class="card">
        <div class="section-title">2. 当前模式</div>
        <div id="themes"></div>
        <div class="section-title">3. 自然语言回答</div>
        <div id="answer" class="muted">等待执行…</div>
      </div>
    </div>

    <div class="grid" style="margin-top: 16px;">
      <div class="card">
        <div class="section-title">问题分析结果</div>
        <pre id="analysis">{}</pre>
      </div>
      <div class="card">
        <div class="section-title">生成的 SQL</div>
        <pre id="sql">-- 等待生成</pre>
      </div>
    </div>

    <div class="grid" style="margin-top: 16px;">
      <div class="card">
        <div class="section-title">查询结果</div>
        <div id="rows" class="muted">暂无结果</div>
      </div>
      <div class="card">
        <div class="section-title">元数据字典</div>
        <pre id="metadata">点击“查看元数据字典”加载</pre>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="section-title">在线编辑元数据</div>
      <div class="row">
        <label>编辑分区：</label>
        <select id="metaSection" onchange="loadEditorSection()">
          <option value="tables">tables</option>
          <option value="joins">joins</option>
          <option value="metrics">metrics</option>
        </select>
        <button class="secondary" onclick="loadEditorSection()">加载当前分区</button>
        <button class="success" onclick="saveMetadata()">保存当前分区</button>
      </div>
      <div class="row muted">这里可以直接在线维护 `tables / joins / metrics` 三个 JSON 分区。</div>
      <textarea id="metaEditor" class="editor"></textarea>
      <div id="saveResult" class="muted" style="margin-top:8px;">未保存</div>
    </div>
  </div>

  <script>
    function setQ(q) { document.getElementById('question').value = q; return false; }
    function pretty(obj) { return JSON.stringify(obj, null, 2); }
    let metadataCache = null;

    async function loadThemes() {
      const res = await fetch('/themes');
      const data = await res.json();
      document.getElementById('themes').innerHTML = `
        <span class="pill">主题: ${data.supported_themes.join(' / ')}</span>
        <span class="pill">模式: ${data.analyzer_modes.join(' / ')}</span>
        <span class="pill">LLM: ${data.llm_model}</span>
      `;
    }

    async function loadMetadata() {
      const res = await fetch('/metadata');
      const data = await res.json();
      metadataCache = data;
      document.getElementById('metadata').textContent = pretty(data);
      loadEditorSection();
    }

    async function loadEditorSection() {
      if (!metadataCache) {
        await loadMetadata();
        return;
      }
      const section = document.getElementById('metaSection').value;
      document.getElementById('metaEditor').value = pretty(metadataCache[section] || []);
    }

    async function saveMetadata() {
      const section = document.getElementById('metaSection').value;
      const content = document.getElementById('metaEditor').value;
      const res = await fetch('/metadata/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ section, content })
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('saveResult').textContent = `保存成功：${section}`;
        await loadMetadata();
      } else {
        document.getElementById('saveResult').textContent = `保存失败：${data.detail || '未知错误'}`;
      }
    }

    async function runAnalyze() {
      const question = document.getElementById('question').value;
      const useLlm = document.getElementById('useLlm').checked;
      const res = await fetch('/analyze', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ question, use_llm: useLlm })
      });
      const data = await res.json();
      document.getElementById('analysis').textContent = pretty(data);
      document.getElementById('answer').textContent = '已完成问题分析，尚未执行查询。';
      document.getElementById('sql').textContent = '-- 尚未生成';
      document.getElementById('rows').innerHTML = '<div class="muted">暂无结果</div>';
    }

    function renderRows(rows) {
      if (!rows || !rows.length) return '<div class="muted">没有数据</div>';
      const keys = Object.keys(rows[0]);
      let html = '<table><thead><tr>' + keys.map(k => `<th>${k}</th>`).join('') + '</tr></thead><tbody>';
      for (const row of rows) {
        html += '<tr>' + keys.map(k => `<td>${row[k] ?? ''}</td>`).join('') + '</tr>';
      }
      html += '</tbody></table>';
      return html;
    }

    async function runAsk() {
      const question = document.getElementById('question').value;
      const useLlm = document.getElementById('useLlm').checked;
      const res = await fetch('/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ question, use_llm: useLlm })
      });
      const data = await res.json();
      document.getElementById('analysis').textContent = pretty(data.analysis || {});
      document.getElementById('sql').textContent = data.sql || '-- 无 SQL';
      document.getElementById('answer').textContent = data.answer || '无回答';
      document.getElementById('rows').innerHTML = renderRows(data.rows || []);
    }

    loadThemes();
    loadMetadata();
  </script>
</body>
</html>
